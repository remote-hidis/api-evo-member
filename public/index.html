<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evolution Manager Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass-effect { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); }
    </style>
</head>
<body class="bg-slate-950 text-slate-200">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const API_BASE_URL = window.location.origin; 

        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const App = () => {
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [userRole, setUserRole] = useState(null); 
            const [members, setMembers] = useState([]);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState(null);
            const [success, setSuccess] = useState(null);

            const [loginForm, setLoginForm] = useState({ name: '', apiKey: '' });
            const [registerForm, setRegisterForm] = useState({ name: '', customToken: '' });

            useEffect(() => {
                const token = localStorage.getItem('manager_token');
                const role = localStorage.getItem('manager_role');
                if (token && role) {
                    setIsLoggedIn(true);
                    setUserRole(role);
                    if (role === 'admin') fetchMembers(token);
                }
            }, []);

            const fetchMembers = async (tokenOverride) => {
                const token = tokenOverride || localStorage.getItem('manager_token');
                if (!token) return;

                try {
                    const response = await fetch(`${API_BASE_URL}/api/members`, {
                        headers: { 'apikey': token }
                    });
                    
                    if (response.status === 401) {
                        handleLogout();
                        return;
                    }

                    if (response.ok) {
                        const data = await response.json();
                        setMembers(data);
                    }
                } catch (err) { console.error("Sync error:", err); }
            };

            const handleLogin = async (e) => {
                e.preventDefault();
                setLoading(true);
                setError(null);
                try {
                    // Admin login bypass ke backend local auth
                    if (loginForm.name === 'admin' && loginForm.apiKey === 'nganjuk123') {
                        setIsLoggedIn(true);
                        setUserRole('admin');
                        localStorage.setItem('manager_token', loginForm.apiKey);
                        localStorage.setItem('manager_role', 'admin');
                        fetchMembers(loginForm.apiKey);
                    } else {
                        const response = await fetch(`${API_BASE_URL}/api/login-member`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(loginForm)
                        });
                        const result = await response.json();
                        if (response.ok) {
                            setIsLoggedIn(true);
                            setUserRole('member');
                            localStorage.setItem('manager_token', loginForm.apiKey);
                            localStorage.setItem('manager_name', loginForm.name);
                            localStorage.setItem('manager_role', 'member');
                        } else {
                            setError(result.error || 'Login Gagal');
                        }
                    }
                } catch (err) { setError('Koneksi ke API Gagal'); }
                finally { setLoading(false); }
            };

            const handleRegister = async (e) => {
                e.preventDefault();
                setLoading(true);
                setError(null);
                setSuccess(null);
                
                const token = localStorage.getItem('manager_token');
                
                try {
                    const response = await fetch(`${API_BASE_URL}/api/register-member`, {
                        method: 'POST',
                        headers: { 
                            'Content-Type': 'application/json', 
                            'apikey': token 
                        },
                        body: JSON.stringify(registerForm)
                    });
                    
                    const result = await response.json();
                    
                    if (response.ok) {
                        setSuccess(`Instance ${registerForm.name} Berhasil Dibuat!`);
                        setRegisterForm({ name: '', customToken: '' });
                        fetchMembers(token);
                    } else {
                        // Jika 401, berarti apikey di header salah/tidak sesuai MASTER_KEY backend
                        if (response.status === 401) {
                            setError("Sesi Admin Tidak Valid. Silakan Login Ulang.");
                        } else {
                            setError(result.details?.message || result.error || 'Gagal membuat instance');
                        }
                    }
                } catch (err) {
                    setError('Terjadi kesalahan jaringan atau server offline');
                } finally {
                    setLoading(false);
                }
            };

            const handleDelete = async (name) => {
                if (!confirm(`Hapus ${name}?`)) return;
                const token = localStorage.getItem('manager_token');
                try {
                    const response = await fetch(`${API_BASE_URL}/api/delete-member/${name}`, {
                        method: 'DELETE',
                        headers: { 'apikey': token }
                    });
                    if (response.ok) fetchMembers(token);
                } catch (err) { setError("Gagal menghapus"); }
            };

            const handleLogout = () => {
                localStorage.clear();
                setIsLoggedIn(false);
                setUserRole(null);
                window.location.reload();
            };

            if (!isLoggedIn) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-6 bg-slate-950">
                        <div className="max-w-md w-full bg-slate-900 border border-slate-800 rounded-3xl p-8 shadow-2xl">
                            <h1 className="text-2xl font-black text-white text-center mb-6 uppercase tracking-widest">Evo Login</h1>
                            <form onSubmit={handleLogin} className="space-y-4">
                                <input 
                                    className="w-full bg-slate-950 border border-slate-800 rounded-xl py-3 px-4 text-white outline-none focus:ring-2 focus:ring-blue-500"
                                    placeholder="Username"
                                    value={loginForm.name}
                                    onChange={e => setLoginForm({...loginForm, name: e.target.value})}
                                    required
                                />
                                <input 
                                    type="password"
                                    className="w-full bg-slate-950 border border-slate-800 rounded-xl py-3 px-4 text-white outline-none focus:ring-2 focus:ring-blue-500"
                                    placeholder="API Key"
                                    value={loginForm.apiKey}
                                    onChange={e => setLoginForm({...loginForm, apiKey: e.target.value})}
                                    required
                                />
                                {error && <div className="text-red-400 text-xs bg-red-500/10 p-3 rounded-xl border border-red-500/20">{error}</div>}
                                <button className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition-all">
                                    {loading ? "Loading..." : "Masuk"}
                                </button>
                            </form>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex flex-col md:flex-row bg-slate-950">
                    <aside className="w-full md:w-64 bg-slate-900 border-r border-slate-800 p-6 flex flex-col">
                        <div className="font-black text-white text-xl mb-10 tracking-tighter">MANAGER API</div>
                        <nav className="flex-1 space-y-2">
                            <div className="bg-blue-600/10 text-blue-400 p-3 rounded-xl font-bold flex items-center gap-3">
                                <Icon name="layout" /> Dashboard
                            </div>
                        </nav>
                        <button onClick={handleLogout} className="text-red-400 font-bold p-3 hover:bg-red-500/10 rounded-xl flex items-center gap-3 w-full text-left">
                            <Icon name="log-out" /> Keluar
                        </button>
                    </aside>

                    <main className="flex-1 p-8 overflow-y-auto">
                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                            {userRole === 'admin' ? (
                                <div className="lg:col-span-1 bg-slate-900 border border-slate-800 p-6 rounded-[2rem] shadow-xl">
                                    <h3 className="font-black text-white mb-6 uppercase text-sm tracking-widest">Register Instance</h3>
                                    <form onSubmit={handleRegister} className="space-y-4">
                                        <input 
                                            className="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-sm outline-none focus:ring-2 focus:ring-blue-500"
                                            placeholder="Nama Instance"
                                            value={registerForm.name}
                                            onChange={e => setRegisterForm({...registerForm, name: e.target.value})}
                                            required
                                        />
                                        <input 
                                            className="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-sm outline-none focus:ring-2 focus:ring-blue-500"
                                            placeholder="Token Member"
                                            value={registerForm.customToken}
                                            onChange={e => setRegisterForm({...registerForm, customToken: e.target.value})}
                                            required
                                        />
                                        {error && <div className="text-red-400 text-[10px] bg-red-500/10 p-2 rounded-lg border border-red-500/10">{error}</div>}
                                        {success && <div className="text-green-400 text-[10px] bg-green-500/10 p-2 rounded-lg border border-green-500/10 font-bold">{success}</div>}
                                        <button disabled={loading} className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition-all shadow-lg shadow-blue-600/20">
                                            {loading ? "Processing..." : "Create Now"}
                                        </button>
                                    </form>
                                </div>
                            ) : (
                                <div className="lg:col-span-1 bg-slate-900 border border-slate-800 p-6 rounded-[2rem] shadow-xl">
                                    <h3 className="font-black text-white mb-2 uppercase text-sm tracking-widest">Sesi Member</h3>
                                    <p className="text-slate-500 text-xs mb-4">Anda login sebagai member.</p>
                                    <div className="bg-slate-950 p-4 rounded-xl border border-slate-800">
                                        <p className="text-[10px] font-black text-slate-600 uppercase mb-1">Instance Aktif</p>
                                        <p className="font-bold text-blue-400 uppercase">{localStorage.getItem('manager_name')}</p>
                                    </div>
                                </div>
                            )}

                            <div className="lg:col-span-2 bg-slate-900 border border-slate-800 rounded-[2rem] overflow-hidden">
                                <div className="p-6 border-b border-slate-800 font-black text-white uppercase text-sm tracking-widest">
                                    {userRole === 'admin' ? "All Instances" : "My Instance Info"}
                                </div>
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left">
                                        <thead className="bg-slate-950/50 text-[10px] text-slate-500 font-black uppercase">
                                            <tr>
                                                <th className="p-5">Name</th>
                                                <th className="p-5">Status</th>
                                                <th className="p-5 text-right">Action</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-800/50">
                                            {userRole === 'admin' ? (
                                                members.length > 0 ? members.map(m => (
                                                    <tr key={m.instance_name} className="hover:bg-slate-800/20">
                                                        <td className="p-5 font-bold text-white uppercase text-xs">{m.instance_name}</td>
                                                        <td className="p-5">
                                                            <span className="text-[10px] bg-green-500/10 text-green-500 px-2 py-1 rounded font-black uppercase">Active</span>
                                                        </td>
                                                        <td className="p-5 text-right">
                                                            <button onClick={() => handleDelete(m.instance_name)} className="text-slate-600 hover:text-red-500 transition-colors">
                                                                <Icon name="trash-2" size={16} />
                                                            </button>
                                                        </td>
                                                    </tr>
                                                )) : (
                                                    <tr><td colSpan="3" className="p-10 text-center text-slate-600 text-xs italic font-bold">No instances found.</td></tr>
                                                )
                                            ) : (
                                                <tr>
                                                    <td className="p-5 font-bold text-white uppercase text-xs">{localStorage.getItem('manager_name')}</td>
                                                    <td className="p-5">
                                                        <span className="text-[10px] bg-blue-500/10 text-blue-500 px-2 py-1 rounded font-black uppercase">Member Mode</span>
                                                    </td>
                                                    <td className="p-5 text-right text-slate-600 text-[10px] font-bold">READ ONLY</td>
                                                </tr>
                                            )}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
