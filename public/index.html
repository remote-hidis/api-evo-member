<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evolution Manager Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass-effect { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); }
        @keyframes pulse-soft { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .animate-pulse-soft { animation: pulse-soft 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    </style>
</head>
<body class="bg-slate-950 text-slate-200">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const API_BASE_URL = window.location.origin; 
        const EVO_URL = "https://easy-evo.nganjuk.net"; 

        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const App = () => {
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [userRole, setUserRole] = useState(null); 
            const [members, setMembers] = useState([]);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState(null);
            const [success, setSuccess] = useState(null);
            
            // State QR Code Modal
            const [showQRModal, setShowQRModal] = useState(false);
            const [selectedInstance, setSelectedInstance] = useState(null);
            const [qrBase64, setQrBase64] = useState("");
            const [qrLoading, setQrLoading] = useState(false);

            // State Detail/Edit Member Modal
            const [showDetailModal, setShowDetailModal] = useState(false);
            const [detailMember, setDetailMember] = useState(null);
            const [detailLoading, setDetailLoading] = useState(false);

            const [loginForm, setLoginForm] = useState({ name: '', apiKey: '' });
            const [registerForm, setRegisterForm] = useState({ name: '', customToken: '' });

            useEffect(() => {
                if (success || error) {
                    const timer = setTimeout(() => { setSuccess(null); setError(null); }, 4000);
                    return () => clearTimeout(timer);
                }
            }, [success, error]);

            useEffect(() => {
                const token = localStorage.getItem('manager_token');
                const role = localStorage.getItem('manager_role');
                if (token && role) {
                    setIsLoggedIn(true);
                    setUserRole(role);
                    if (role === 'admin') fetchMembers(token);
                }
            }, []);

            const fetchMembers = async (tokenOverride) => {
                const token = tokenOverride || localStorage.getItem('manager_token');
                try {
                    const response = await fetch(`${API_BASE_URL}/api/members`, {
                        headers: { 'apikey': token }
                    });
                    if (response.ok) {
                        const data = await response.json();
                        setMembers(data);
                    }
                } catch (err) { console.error("Sync error:", err); }
            };

            const handleLogin = async (e) => {
                e.preventDefault();
                setLoading(true);
                setError(null);
                try {
                    if (loginForm.name === 'admin' && loginForm.apiKey === 'nganjuk123') {
                        setIsLoggedIn(true);
                        setUserRole('admin');
                        localStorage.setItem('manager_token', loginForm.apiKey);
                        localStorage.setItem('manager_role', 'admin');
                        fetchMembers(loginForm.apiKey);
                    } else {
                        const response = await fetch(`${API_BASE_URL}/api/login-member`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(loginForm)
                        });
                        const result = await response.json();
                        if (response.ok) {
                            setIsLoggedIn(true);
                            setUserRole('member');
                            localStorage.setItem('manager_token', loginForm.apiKey);
                            localStorage.setItem('manager_name', loginForm.name);
                            localStorage.setItem('manager_role', 'member');
                        } else { setError(result.error || 'Login Gagal'); }
                    }
                } catch (err) { setError('Koneksi Gagal'); }
                finally { setLoading(false); }
            };

            // LOGIKA LOGOUT BARU: Membersihkan seluruh sesi secara total & aman
            const handleLogout = () => {
                // 1. Hapus item di localStorage secara spesifik
                localStorage.removeItem('manager_token');
                localStorage.removeItem('manager_role');
                localStorage.removeItem('manager_name');

                // 2. Reset total seluruh state React kembali ke awal (Clear Memory Session)
                setIsLoggedIn(false);
                setUserRole(null);
                setMembers([]);
                setLoginForm({ name: '', apiKey: '' });
                setRegisterForm({ name: '', customToken: '' });
                setDetailMember(null);
                setSelectedInstance(null);
                setQrBase64("");
                setError(null);
                setSuccess(null);
            };

            const handleOpenQR = async (instanceName) => {
                setSelectedInstance(instanceName);
                setShowQRModal(true);
                setQrLoading(true);
                setQrBase64("");

                try {
                    const response = await fetch(`${EVO_URL}/instance/connect/${instanceName}`, {
                        headers: { 'apikey': 'nganjuk123' }
                    });
                    const data = await response.json();
                    if (data.base64) {
                        setQrBase64(data.base64);
                    } else if (data.message) {
                        setError(data.message);
                    }
                } catch (err) {
                    setError("Gagal memuat QR Code. Pastikan Evolution API aktif.");
                } finally {
                    setQrLoading(false);
                }
            };

            const handleOpenDetail = async (id) => {
                setShowDetailModal(true);
                setDetailLoading(true);
                setDetailMember(null);
                const token = localStorage.getItem('manager_token');
                try {
                    const response = await fetch(`${API_BASE_URL}/api/members/${id}`, {
                        headers: { 'apikey': token }
                    });
                    if (response.ok) {
                        const data = await response.json();
                        setDetailMember(data);
                    } else { setError('Gagal memuat data detail member'); }
                } catch (err) { setError('Gangguan jaringan'); }
                finally { setDetailLoading(false); }
            };

            const handleUpdateMember = async (e) => {
                e.preventDefault();
                setLoading(true);
                const token = localStorage.getItem('manager_token');
                try {
                    const response = await fetch(`${API_BASE_URL}/api/members/${detailMember.id}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json', 'apikey': token },
                        body: JSON.stringify({
                            apiKey: detailMember.api_key,
                            status: detailMember.status
                        })
                    });
                    if (response.ok) {
                        setSuccess('Data member berhasil diperbarui!');
                        setShowDetailModal(false);
                        fetchMembers(token);
                    } else { setError('Gagal memperbarui data'); }
                } catch (err) { setError('Error jaringan'); }
                finally { setLoading(false); }
            };

            const handleDeleteMember = async (instanceName) => {
                if (confirm(`Apakah Anda yakin ingin menghapus member '${instanceName}'?`)) {
                    const token = localStorage.getItem('manager_token');
                    try {
                        const response = await fetch(`${API_BASE_URL}/api/members/instance/${instanceName}`, {
                            method: 'DELETE',
                            headers: { 'apikey': token }
                        });
                        if (response.ok) {
                            setSuccess(`Member '${instanceName}' berhasil dihapus.`);
                            fetchMembers(token);
                        } else { setError('Gagal menghapus member'); }
                    } catch (err) { setError('Error jaringan'); }
                }
            };

            const handleRegister = async (e) => {
                e.preventDefault();
                setLoading(true);
                setError(null);
                const token = localStorage.getItem('manager_token');
                try {
                    const response = await fetch(`${API_BASE_URL}/api/register-member`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'apikey': token },
                        body: JSON.stringify(registerForm)
                    });
                    if (response.ok) {
                        setSuccess(`Berhasil mendaftarkan member baru!`);
                        setRegisterForm({ name: '', customToken: '' });
                        fetchMembers(token);
                    } else { setError('Gagal registrasi'); }
                } catch (err) { setError('Error jaringan'); }
                finally { setLoading(false); }
            };

            return (
                <div className="min-h-screen flex flex-col md:flex-row bg-slate-950">
                    
                    {/* SIDEBAR FIXED */}
                    <aside className="w-full md:w-64 bg-slate-900 border-r border-slate-800 p-6 flex flex-col shadow-xl md:h-screen md:sticky md:top-0 z-40">
                        <div className="font-black text-white text-xl mb-10 tracking-tighter flex items-center gap-2">
                            <div className="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center"><Icon name="cpu" size={16}/></div>
                            MANAGER API
                        </div>
                        <nav className="flex-1 space-y-2">
                            <div className="bg-blue-600/10 text-blue-400 p-3 rounded-xl font-bold flex items-center gap-3">
                                <Icon name="layout" /> Dashboard
                            </div>
                        </nav>
                        
                        {/* Tombol Logout memanggil fungsi handleLogout */}
                        <button onClick={handleLogout} className="text-slate-400 font-bold p-3 bg-slate-950/40 hover:bg-red-500/10 hover:text-red-400 transition-all rounded-xl flex items-center gap-3 border border-slate-800/50 mt-auto">
                            <Icon name="log-out" /> Logout
                        </button>
                    </aside>

                    {/* Main Content */}
                    <main className="flex-1 p-8 overflow-y-auto">
                        <div className="flex justify-between items-center mb-8">
                            <div>
                                <h2 className="text-2xl font-black text-white">Device Control</h2>
                                <p className="text-slate-500 text-sm">Hubungkan dan kelola instance WhatsApp</p>
                            </div>
                        </div>

                        {error && <div className="mb-4 text-red-400 text-xs bg-red-500/10 p-4 rounded-xl border border-red-500/20">{error}</div>}
                        {success && <div className="mb-4 text-green-400 text-xs bg-green-500/10 p-4 rounded-xl border border-green-500/20">{success}</div>}

                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                            {userRole === 'admin' && (
                                <div className="lg:col-span-1 bg-slate-900 border border-slate-800 p-6 rounded-[2rem] shadow-xl h-fit">
                                    <h3 className="font-bold text-white mb-6 uppercase text-xs tracking-widest text-slate-400">Pendaftaran Baru</h3>
                                    <form onSubmit={handleRegister} className="space-y-4">
                                        <input className="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-sm text-white focus:ring-2 focus:ring-blue-500 outline-none" placeholder="ID Instance (e.g. toko_abc)" value={registerForm.name} onChange={e => setRegisterForm({...registerForm, name: e.target.value})} required />
                                        <input className="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-sm text-white focus:ring-2 focus:ring-blue-500 outline-none" placeholder="API Key Member" value={registerForm.customToken} onChange={e => setRegisterForm({...registerForm, customToken: e.target.value})} required />
                                        <button className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition-all">Daftarkan Member</button>
                                    </form>
                                </div>
                            )}

                            {/* List Instance */}
                            <div className="lg:col-span-2 bg-slate-900 border border-slate-800 rounded-[2rem] overflow-hidden shadow-xl h-fit">
                                <div className="p-6 border-b border-slate-800 font-bold text-white uppercase text-xs tracking-widest text-slate-400">Daftar Koneksi</div>
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left">
                                        <thead className="bg-slate-950/50 text-[10px] text-slate-500 font-black uppercase tracking-widest">
                                            <tr>
                                                <th className="p-5">Device Name</th>
                                                <th className="p-5">Status</th>
                                                <th className="p-5">WhatsApp Scan</th>
                                                <th className="p-5 text-right">Aksi</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-800/50">
                                            {userRole === 'admin' ? members.map(m => (
                                                <tr key={m.id} className="hover:bg-slate-800/20 transition-all">
                                                    <td className="p-5 font-bold text-white uppercase text-xs tracking-tighter">{m.instance_name}</td>
                                                    <td className="p-5">
                                                        <span className={`px-3 py-1 rounded-full text-[10px] font-black uppercase ${m.status === 'active' ? 'bg-green-500/10 text-green-400 border border-green-500/20' : 'bg-amber-500/10 text-amber-400 border border-amber-500/20'}`}>
                                                            {m.status}
                                                        </span>
                                                    </td>
                                                    <td className="p-5">
                                                        <button 
                                                            onClick={() => handleOpenQR(m.instance_name)}
                                                            className="flex items-center gap-2 bg-blue-600/10 text-blue-400 px-4 py-2 rounded-lg text-[10px] font-black uppercase border border-blue-500/20 hover:bg-blue-600 hover:text-white transition-all shadow-lg shadow-blue-600/5"
                                                        >
                                                            <Icon name="qr-code" size={14}/> Scan QR
                                                        </button>
                                                    </td>
                                                    <td className="p-5 text-right flex items-center justify-end gap-2">
                                                        <button onClick={() => handleOpenDetail(m.id)} className="text-slate-400 hover:text-blue-400 transition-colors p-2" title="Edit Member">
                                                            <Icon name="sliders" size={16} />
                                                        </button>
                                                        <button onClick={() => handleDeleteMember(m.instance_name)} className="text-slate-600 hover:text-red-500 transition-colors p-2" title="Hapus Member">
                                                            <Icon name="trash-2" size={16} />
                                                        </button>
                                                    </td>
                                                </tr>
                                            )) : (
                                                <tr className="bg-slate-800/20">
                                                    <td className="p-5 font-bold text-white uppercase text-xs">{localStorage.getItem('manager_name')}</td>
                                                    <td className="p-5"><span className="px-3 py-1 bg-green-500/10 text-green-400 border border-green-500/20 rounded-full text-[10px] font-black uppercase">Active</span></td>
                                                    <td className="p-5">
                                                        <button 
                                                            onClick={() => handleOpenQR(localStorage.getItem('manager_name'))}
                                                            className="flex items-center gap-2 bg-blue-600 text-white px-6 py-2.5 rounded-xl text-xs font-black uppercase shadow-lg shadow-blue-600/20 animate-pulse-soft"
                                                        >
                                                            <Icon name="qr-code" size={14}/> Klik untuk Scan WA
                                                        </button>
                                                    </td>
                                                    <td className="p-5 text-right text-slate-700 text-[10px] font-black">USER ONLY</td>
                                                </tr>
                                            )}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>

                        {/* DETAIL & EDIT MEMBER MODAL */}
                        {showDetailModal && (
                            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-950/90 backdrop-blur-sm">
                                <div className="bg-slate-900 border border-slate-800 w-full max-w-md rounded-[2.5rem] p-8 shadow-2xl relative overflow-hidden">
                                    <button onClick={() => setShowDetailModal(false)} className="absolute top-6 right-6 text-slate-500 hover:text-white"><Icon name="x" /></button>
                                    
                                    <div className="mb-6 text-center">
                                        <div className="w-14 h-14 bg-blue-600/20 rounded-2xl flex items-center justify-center mx-auto mb-3 text-blue-500 border border-blue-500/20">
                                            <Icon name="sliders" size={28} />
                                        </div>
                                        <h3 className="text-xl font-black text-white uppercase tracking-tighter">Pengaturan Member</h3>
                                    </div>

                                    {detailLoading ? (
                                        <div className="py-12 text-center text-slate-500 text-xs font-bold uppercase animate-pulse">Memuat Data...</div>
                                    ) : detailMember ? (
                                        <form onSubmit={handleUpdateMember} className="space-y-4">
                                            <div>
                                                <label className="block text-[10px] font-black uppercase tracking-widest text-slate-500 mb-2">Instance Name</label>
                                                <input className="w-full bg-slate-950/60 border border-slate-800/80 rounded-xl p-3 text-sm text-slate-400 outline-none cursor-not-allowed" value={detailMember.instance_name} disabled />
                                            </div>
                                            <div>
                                                <label className="block text-[10px] font-black uppercase tracking-widest text-slate-500 mb-2">API Key / Token Member</label>
                                                <input className="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-sm text-white focus:ring-2 focus:ring-blue-500 outline-none font-mono" value={detailMember.api_key} onChange={e => setDetailMember({...detailMember, api_key: e.target.value})} required />
                                            </div>
                                            <div>
                                                <label className="block text-[10px] font-black uppercase tracking-widest text-slate-500 mb-2">Status Akun</label>
                                                <select className="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-sm text-white focus:ring-2 focus:ring-blue-500 outline-none" value={detailMember.status} onChange={e => setDetailMember({...detailMember, status: e.target.value})}>
                                                    <option value="active">Active (Aktif)</option>
                                                    <option value="suspended">Suspended (Blokir)</option>
                                                </select>
                                            </div>
                                            <div className="pt-4 flex gap-3">
                                                <button type="button" onClick={() => setShowDetailModal(false)} className="w-1/3 bg-slate-800 hover:bg-slate-700 text-white font-bold py-3 rounded-xl transition-all text-xs uppercase">Batal</button>
                                                <button type="submit" className="w-2/3 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition-all text-xs uppercase">Simpan Perubahan</button>
                                            </div>
                                        </form>
                                    ) : (
                                        <div className="text-center text-red-400 text-xs">Gagal mengambil data dari API Server.</div>
                                    )}
                                </div>
                            </div>
                        )}

                        {/* QR CODE MODAL */}
                        {showQRModal && (
                            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-950/90 backdrop-blur-sm">
                                <div className="bg-slate-900 border border-slate-800 w-full max-sm rounded-[2.5rem] p-8 shadow-2xl text-center relative overflow-hidden">
                                    <button onClick={() => setShowQRModal(false)} className="absolute top-6 right-6 text-slate-500 hover:text-white"><Icon name="x" /></button>
                                    
                                    <div className="mb-6">
                                        <div className="w-16 h-16 bg-blue-600/20 rounded-2xl flex items-center justify-center mx-auto mb-4 text-blue-500 border border-blue-500/20">
                                            <Icon name="smartphone" size={32} />
                                        </div>
                                        <h3 className="text-xl font-black text-white uppercase tracking-tighter">Scan WhatsApp</h3>
                                        <p className="text-slate-500 text-xs mt-1">Instance: <span className="text-blue-400 font-bold">{selectedInstance}</span></p>
                                    </div>

                                    <div className="bg-white p-4 rounded-3xl inline-block shadow-inner relative group">
                                        {qrLoading ? (
                                            <div className="w-48 h-48 flex flex-col items-center justify-center bg-slate-100 rounded-2xl">
                                                <div className="w-8 h-8 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
                                                <p className="text-[10px] text-slate-400 mt-4 font-black uppercase tracking-widest">Generating QR...</p>
                                            </div>
                                        ) : qrBase64 ? (
                                            <img src={qrBase64} alt="QR Code" className="w-48 h-48 rounded-xl" />
                                        ) : (
                                            <div className="w-48 h-48 flex items-center justify-center bg-red-50 text-red-500 p-4 text-[10px] font-bold">
                                                Gagal mengambil QR. Cek koneksi server.
                                            </div>
                                        )}
                                    </div>

                                    <div className="mt-8 space-y-4">
                                        <p className="text-[10px] text-slate-500 font-bold leading-relaxed">
                                            Buka WhatsApp di HP Anda → Menu/Setelan → Perangkat Tertaut → Tautkan Perangkat.
                                        </p>
                                        <button 
                                            onClick={() => handleOpenQR(selectedInstance)}
                                            className="w-full py-4 bg-slate-800 hover:bg-slate-700 text-white rounded-2xl text-xs font-black uppercase transition-all flex items-center justify-center gap-2"
                                        >
                                            <Icon name="refresh-cw" size={14} /> Refresh QR Code
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
